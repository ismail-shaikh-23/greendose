services:
  backend:
    restart: always    
    container_name: greendose-backend
    image: ismailshaikh23/greendose-backend
    environment:
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_HOST=${REDIS_HOST}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - FRONT_END_BASE_URL=${FRONT_END_BASE_URL}
      - BACK_END_BASE_URL=${BACK_END_BASE_URL}
    ports:
      - "7861:3000"
    volumes:
     - greendose-wellness-dev-uploads:/usr/share/app/public
    

  db:
    restart: always
    container_name: greendose-db
    image: postgres:12
    environment:
      LC_ALL: C.UTF-8
    volumes:
      - greendose-wellness-pg-data:/var/lib/postgresql/data
    ports:
      - "7860:5432"  

  redis:
    restart: always
    container_name: greendose-wellness-redis
    image: redis:latest
    ports:
       - "7869:6379" 
  
  frontend:
    restart: always
    container_name: greendose-frontend
    image: ismailshaikh23/greendose-frontend
    ports:
        - "7862:80"


volumes:
  greendose-wellness-pg-data:
  greendose-wellness-data-dev:
  greendose-wellness-dev-uploads:

